<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📅 我们的纪念日</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#0f0f23;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e0e0e0;overflow-x:hidden;touch-action:manipulation}

.hero{text-align:center;padding:50px 20px 20px;position:relative;z-index:1}
.hero h1{font-size:32px;background:linear-gradient(90deg,#f472b6,#a78bfa,#60a5fa);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.hero p{color:#6b7280;font-size:14px;margin-top:8px}

.container{max-width:600px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}

/* Big counter */
.counter-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px 24px;text-align:center;margin:20px 0;position:relative;overflow:hidden}
.counter-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(244,114,182,0.08),transparent 60%),radial-gradient(circle at 70% 50%,rgba(167,139,250,0.08),transparent 60%);pointer-events:none}
.counter-big{font-size:72px;font-weight:800;background:linear-gradient(135deg,#f472b6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;font-variant-numeric:tabular-nums}
.counter-label{font-size:16px;color:#9ca3af;margin-top:8px}
.counter-sub{font-size:14px;color:#6b7280;margin-top:12px}
.counter-sub span{color:#f472b6;font-weight:600}

/* Timeline */
.timeline{position:relative;padding-left:28px;margin:24px 0}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#f472b6,#a78bfa,#60a5fa,#34d399)}
.t-item{position:relative;margin-bottom:24px;animation:fadeUp 0.5s ease both}
.t-item:nth-child(1){animation-delay:0.1s}
.t-item:nth-child(2){animation-delay:0.2s}
.t-item:nth-child(3){animation-delay:0.3s}
.t-item:nth-child(4){animation-delay:0.4s}
.t-item:nth-child(5){animation-delay:0.5s}
.t-item:nth-child(6){animation-delay:0.6s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.t-dot{position:absolute;left:-24px;top:6px;width:14px;height:14px;border-radius:50%;border:3px solid;background:#0f0f23}
.t-item:nth-child(1) .t-dot{border-color:#f472b6}
.t-item:nth-child(2) .t-dot{border-color:#a78bfa}
.t-item:nth-child(3) .t-dot{border-color:#60a5fa}
.t-item:nth-child(4) .t-dot{border-color:#34d399}
.t-item:nth-child(5) .t-dot{border-color:#facc15}
.t-item:nth-child(6) .t-dot{border-color:#f97316}
.t-item:nth-child(7) .t-dot{border-color:#ec4899}
.t-item:nth-child(8) .t-dot{border-color:#06b6d4}
.t-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.3s}
.t-card:active{transform:scale(0.97);border-color:rgba(244,114,182,0.3);transition:all 0.1s}
.t-date{font-size:13px;color:#a78bfa;margin-bottom:6px;font-weight:600}
.t-title{font-size:17px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.t-msg{color:#9ca3af;font-size:14px;line-height:1.7;display:none}
.t-card.open .t-msg{display:block;animation:fadeUp 0.3s ease}
.t-days{font-size:12px;color:#6b7280;margin-top:8px}

/* Today's message */
.today-card{background:linear-gradient(135deg,rgba(244,114,182,0.12),rgba(167,139,250,0.12));border:1px solid rgba(244,114,182,0.2);border-radius:20px;padding:28px;text-align:center;margin:24px 0}
.today-card .emoji{font-size:48px;margin-bottom:12px}
.today-card .msg{font-size:16px;color:#e0e0e0;line-height:1.8}
.today-card .date{font-size:13px;color:#a78bfa;margin-top:12px}

.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particles span{position:absolute;animation:pFloat linear infinite;opacity:0}
@keyframes pFloat{0%{transform:translateY(100vh);opacity:0}20%{opacity:0.15}100%{transform:translateY(-10vh);opacity:0}}

.footer{text-align:center;padding:40px 20px;color:#374151;font-size:13px;position:relative;z-index:1}
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#f472b6,#a78bfa);z-index:100;transition:width 0.1s}

@media(max-width:600px){.hero h1{font-size:26px}.counter-big{font-size:56px}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="particles" id="particles"></div>

<div class="hero">
  <h1>📅 我们的纪念日</h1>
  <p>每一个日子都是独一无二的 · 因为有你</p>
</div>

<div class="container">

  <!-- Big counter -->
  <div class="counter-card">
    <div class="counter-big" id="daysTogether">---</div>
    <div class="counter-label">天 · 我们相识</div>
    <div class="counter-sub">相当于 <span id="hoursT">0</span> 小时 / <span id="minutesT">0</span> 次想你</div>
  </div>

  <!-- Today's love message -->
  <div class="today-card">
    <div class="emoji" id="todayEmoji">💕</div>
    <div class="msg" id="todayMsg">今天也是想你的一天</div>
    <div class="date" id="todayDate"></div>
  </div>

  <!-- Timeline -->
  <h3 style="color:#c4b5fd;font-size:18px;text-align:center;margin:28px 0 16px">💝 我们的故事线</h3>
  <div class="timeline" id="timeline"></div>

</div>

<div class="footer">📅 每一天都值得记住 · 因为每一天都有你</div>

<script>
// ========== 设定你们的日期 ==========
const TOGETHER_DATE = new Date('2025-10-12'); // 认识的日期

const MILESTONES = [
  {date:'2025-10-12', emoji:'✨', title:'我们认识了', msg:'缘分就是这么奇妙，从这天起我的世界里多了你'},
  {date:'2025-11-29', emoji:'💕', title:'在一起的第一天', msg:'从认识到在一起，48天。每一天都在确认，你就是那个对的人'},
  {date:'2025-12-24', emoji:'🎄', title:'第一个圣诞节', msg:'虽然不在身边，视频里看你逛圣诞市场，好想和你一起喝热红酒'},
  {date:'2026-01-01', emoji:'🎆', title:'一起跨年', msg:'新年的第一秒，你说"新年快乐"，我说"有你就快乐"'},
  {date:'2026-01-29', emoji:'🧧', title:'第一个春节', msg:'过年的时候特别想你，给你发了超大红包'},
  {date:'2026-02-14', emoji:'💝', title:'第一个情人节', msg:'异地的情人节，没法送花但写了一封长长的信'},
  {date:'2026-05-29', emoji:'🎂', title:'在一起半年', msg:'半年了！182天，每一天都在认真喜欢你'},
  {date:'2026-11-29', emoji:'🎉', title:'一周年纪念', msg:'等到这天，一定要好好庆祝'},
];
// ====================================

// Particles
(function(){
  const bg=document.getElementById('particles');
  const items=['💗','✨','💕','🌟','💖'];
  for(let i=0;i<25;i++){
    const s=document.createElement('span');
    s.textContent=items[Math.floor(Math.random()*items.length)];
    s.style.left=Math.random()*100+'%';
    s.style.fontSize=(10+Math.random()*14)+'px';
    s.style.animationDuration=(8+Math.random()*12)+'s';
    s.style.animationDelay=Math.random()*10+'s';
    bg.appendChild(s);
  }
})();

// Days counter
function updateCounter(){
  const now=new Date();
  const diff=now-TOGETHER_DATE;
  const days=Math.floor(diff/86400000);
  const hours=days*24;
  document.getElementById('daysTogether').textContent=days;
  document.getElementById('hoursT').textContent=hours.toLocaleString();
  document.getElementById('minutesT').textContent=(hours*60).toLocaleString();
}
updateCounter();

// Today's message
const dailyMsgs=[
  {e:'💕',m:'异地不异心，你是我最美的牵挂'},
  {e:'🌙',m:'月亮代替我陪你，但我比月亮更想你'},
  {e:'☀️',m:'今天的太阳，帮我替你暖暖手'},
  {e:'🌸',m:'想送你一束花，但我更想送你一个拥抱'},
  {e:'⭐',m:'你是我最亮的星，无论多远都能看见'},
  {e:'🍀',m:'今天的幸运都给你，因为你是我最大的幸运'},
  {e:'🎈',m:'快乐不需要理由，但想你是最好的理由'},
  {e:'🧸',m:'如果我是玩偶多好，可以天天被你抱着'},
  {e:'🌈',m:'雨后有彩虹，异地后有更好的我们'},
  {e:'💌',m:'这封情书不用邮寄，因为它直达你的心'},
  {e:'🎵',m:'最好听的情歌，歌词都是关于你'},
  {e:'📸',m:'最美的风景不在德国，在你的笑容里'},
  {e:'🧁',m:'今天有没有吃甜的？没有的话，想想我'},
  {e:'🌻',m:'向日葵追太阳，我追你'},
  {e:'💎',m:'你比钻石还珍贵，因为钻石没有温度'},
];
const todayIdx=Math.floor((new Date()-new Date('2024-01-01'))/86400000)%dailyMsgs.length;
const todayItem=dailyMsgs[todayIdx];
document.getElementById('todayEmoji').textContent=todayItem.e;
document.getElementById('todayMsg').textContent=todayItem.m;
const now=new Date();
document.getElementById('todayDate').textContent=now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// Timeline
const tl=document.getElementById('timeline');
MILESTONES.sort((a,b)=>new Date(b.date)-new Date(a.date));
MILESTONES.forEach(m=>{
  const d=new Date(m.date);
  const daysAgo=Math.floor((now-d)/86400000);
  const item=document.createElement('div');
  item.className='t-item';
  item.innerHTML=`<div class="t-dot"></div><div class="t-card" onclick="this.classList.toggle('open')"><div class="t-date">${d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'})}</div><div class="t-title">${m.emoji} ${m.title}</div><div class="t-msg">${m.msg}</div><div class="t-days">${daysAgo>0?daysAgo+'天前':'今天 💕'}</div></div>`;
  tl.appendChild(item);
});

// Progress
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const p=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100;
  document.getElementById('progress').style.width=p+'%';
},{passive:true});
</script>
</body>
</html>
