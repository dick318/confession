<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍲 今晚，火锅走起？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0000 0%, #3d0000 30%, #5c1a00 60%, #2d0a00 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    cursor: default;
    color: #fff;
  }

  /* Steam particles */
  .steam-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .steam-bg span {
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    animation: steam-up linear infinite;
  }
  @keyframes steam-up {
    0%   { transform: translateY(100vh) scale(1); opacity: 0; }
    20%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(3); opacity: 0; }
  }

  /* Hero section */
  .hero {
    position: relative; z-index: 1;
    text-align: center;
    padding: 60px 20px 20px;
    animation: fade-down 1s ease both;
  }
  @keyframes fade-down {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero h1 {
    font-size: 42px;
    background: linear-gradient(90deg, #ff6b35, #ff3d00, #ff9800, #ff6b35);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fire-shimmer 2s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes fire-shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .hero p {
    color: rgba(255,255,255,0.6);
    font-size: 15px;
  }

  /* Gallery */
  .gallery {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 30px auto;
    padding: 0 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .gallery .item {
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 1;
    cursor: pointer;
    animation: pop-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .gallery .item:nth-child(1) { animation-delay: 0.1s; }
  .gallery .item:nth-child(2) { animation-delay: 0.2s; }
  .gallery .item:nth-child(3) { animation-delay: 0.3s; }
  .gallery .item:nth-child(4) { animation-delay: 0.4s; grid-column: span 2; aspect-ratio: 2/1; }
  .gallery .item:nth-child(5) { animation-delay: 0.5s; }
  .gallery .item:nth-child(6) { animation-delay: 0.6s; grid-column: span 2; aspect-ratio: 2/1; }

  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.8) rotate(-2deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .gallery img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s, filter 0.5s;
  }
  .gallery .item:hover img {
    transform: scale(1.1);
    filter: brightness(1.2) saturate(1.3);
  }
  .gallery .item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.5));
    pointer-events: none;
  }
  .gallery .item .label {
    position: absolute;
    bottom: 12px; left: 16px;
    z-index: 2;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* Card */
  .card {
    position: relative; z-index: 1;
    max-width: 560px;
    margin: 30px auto 60px;
    background: rgba(255,60,0,0.08);
    border: 1px solid rgba(255,107,53,0.2);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px 36px;
    text-align: center;
    animation: card-in 0.8s 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card .emoji { font-size: 56px; animation: wobble 2s ease-in-out infinite; }
  @keyframes wobble {
    0%,100% { transform: rotate(0deg); }
    25%     { transform: rotate(-8deg); }
    75%     { transform: rotate(8deg); }
  }

  .card h2 {
    margin: 20px 0 12px;
    font-size: 24px;
    color: #ff6b35;
  }
  .card .msg {
    font-size: 16px;
    line-height: 1.9;
    color: rgba(255,255,255,0.8);
    text-align: left;
  }
  .card .msg .hi {
    color: #ff9800;
    font-weight: 700;
  }

  /* Menu section */
  .menu-title {
    position: relative; z-index: 1;
    text-align: center;
    margin: 30px 0 16px;
    font-size: 20px;
    color: #ff9800;
  }
  .menu-title span { font-size: 28px; vertical-align: middle; }

  .menu-grid {
    position: relative; z-index: 1;
    max-width: 500px;
    margin: 0 auto 30px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .menu-item {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.15);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
  }
  .menu-item:hover {
    background: rgba(255,107,53,0.2);
    transform: translateY(-3px);
    border-color: rgba(255,107,53,0.4);
  }
  .menu-item .icon { font-size: 32px; }
  .menu-item .name { font-size: 15px; margin-top: 6px; color: rgba(255,255,255,0.9); }
  .menu-item.checked {
    background: rgba(255,107,53,0.25);
    border-color: #ff6b35;
    box-shadow: 0 0 20px rgba(255,107,53,0.2);
  }

  /* Button */
  .btn-area {
    position: relative; z-index: 1;
    text-align: center;
    padding: 0 20px 60px;
  }
  .btn-go {
    padding: 18px 48px;
    border: none;
    border-radius: 50px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    background: linear-gradient(135deg, #ff6b35, #ff3d00);
    color: #fff;
    box-shadow: 0 8px 30px rgba(255,61,0,0.4);
    transition: all 0.3s;
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 8px 30px rgba(255,61,0,0.4); }
    50%     { box-shadow: 0 8px 50px rgba(255,61,0,0.7), 0 0 80px rgba(255,107,53,0.3); }
  }
  .btn-go:hover {
    transform: translateY(-3px) scale(1.05);
  }

  /* Success overlay */
  .success {
    display: none;
    position: fixed; inset: 0;
    z-index: 100;
    background: rgba(26,0,0,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: fade-in 0.5s;
  }
  .success.show { display: flex; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .success .big { font-size: 100px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }
  .success h2 { margin-top: 20px; font-size: 30px; color: #ff9800; }
  .success p { margin-top: 10px; color: rgba(255,255,255,0.6); font-size: 16px; }

  /* Click fire */
  .click-fire {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    z-index: 50;
    animation: fire-pop 0.8s ease-out forwards;
  }
  @keyframes fire-pop {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
  }

  /* Float emojis */
  .float-emoji {
    position: fixed; z-index: 0;
    pointer-events: none;
    font-size: 30px;
    animation: float-diag linear infinite;
    opacity: 0.15;
  }
  @keyframes float-diag {
    0%   { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(200px, -120vh) rotate(360deg); }
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 28px; }
    .gallery { grid-template-columns: 1fr 1fr; gap: 10px; }
    .gallery .item:nth-child(4),
    .gallery .item:nth-child(6) { grid-column: span 1; aspect-ratio: 1; }
    .card { margin: 20px 16px 40px; padding: 28px 20px; }
  }
</style>
</head>
<body>

<!-- Steam background -->
<div class="steam-bg" id="steamBg"></div>

<!-- Floating food emojis -->
<div id="floatEmojis"></div>

<!-- Hero -->
<div class="hero">
  <h1>🔥 今晚吃火锅 🔥</h1>
  <p>图片已经替你选好了，就等你点头</p>
</div>

<!-- Hotpot gallery -->
<div class="gallery">
  <div class="item">
    <img src="https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&q=80" alt="麻辣火锅">
    <div class="label">🌶️ 麻辣锅底</div>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1555126634-323283e090fa?w=600&q=80" alt="火锅食材">
    <div class="label">🥩 新鲜肉片</div>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?w=600&q=80" alt="涮菜">
    <div class="label">🥬 蔬菜拼盘</div>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&q=80" alt="美食">
    <div class="label">🍲 满满一桌</div>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1563245372-f21724e3856d?w=600&q=80" alt="蘸料">
    <div class="label">🧂 秘制蘸料</div>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1547592180-85f173990554?w=800&q=80" alt="聚餐">
    <div class="label">👫 和你一起</div>
  </div>
</div>

<!-- Persuasion card -->
<div class="card">
  <div class="emoji">🫕</div>
  <h2>理由我都想好了</h2>
  <div class="msg">
    <p>🔸 天气刚好<span class="hi">适合吃辣发汗</span></p>
    <p>🔸 毛肚、肥牛、虾滑都是你的最爱</p>
    <p>🔸 我负责涮，你负责吃</p>
    <p>🔸 还可以点你最爱的<span class="hi">芝士年糕</span></p>
    <p>🔸 吃完可以散步消食，<span="hi">正好约会</span></p>
    <p>&nbsp;</p>
    <p style="text-align:center;font-size:18px;color:#ff6b35;font-weight:700;">
      所以，今晚走不走？🥹
    </p>
  </div>
</div>

<!-- Pick your order -->
<div class="menu-title"><span>📝</span> 点菜环节（戳你想要的）</div>
<div class="menu-grid" id="menuGrid">
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🥩</div><div class="name">肥牛卷</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🫀</div><div class="name">毛肚</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🦐</div><div class="name">虾滑</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🧀</div><div class="name">芝士年糕</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🥬</div><div class="name">娃娃菜</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🍄</div><div class="name">金针菇</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🍜</div><div class="name">宽粉</div>
  </div>
  <div class="menu-item" onclick="toggleMenu(this)">
    <div class="icon">🫘</div><div class="name">鸭血豆腐</div>
  </div>
</div>

<!-- Go button -->
<div class="btn-area">
  <button class="btn-go" onclick="goEat()">🔥 出发！吃火锅！🔥</button>
</div>

<!-- Success -->
<div class="success" id="success">
  <div class="big">🫕</div>
  <h2>太好了！这就走！</h2>
  <p>我已经在订位了… 💨</p>
</div>

<script>
// Steam particles
(function() {
  const bg = document.getElementById('steamBg');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDuration = (4 + Math.random() * 6) + 's';
    s.style.animationDelay = (Math.random() * 8) + 's';
    bg.appendChild(s);
  }
})();

// Floating food emojis
(function() {
  const container = document.getElementById('floatEmojis');
  const emojis = ['🌶️','🧅','🥩','🥬','🍄','🫕','🔥','🍲'];
  for (let i = 0; i < 12; i++) {
    const e = document.createElement('div');
    e.className = 'float-emoji';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = Math.random() * 100 + '%';
    e.style.top = (20 + Math.random() * 80) + '%';
    e.style.animationDuration = (10 + Math.random() * 15) + 's';
    e.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(e);
  }
})();

// Click effects
document.addEventListener('click', function(e) {
  const h = document.createElement('div');
  h.className = 'click-fire';
  h.textContent = ['🔥','🌶️','✨','💥'][Math.floor(Math.random()*4)];
  h.style.left = e.clientX + 'px';
  h.style.top = e.clientY + 'px';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 800);
});

// Toggle menu items
function toggleMenu(el) {
  el.classList.toggle('checked');
}

// Go eat!
function goEat() {
  document.getElementById('success').classList.add('show');
  for (let b = 0; b < 6; b++) {
    setTimeout(() => spawnFirework(), b * 300);
  }
}
function spawnFirework() {
  const colors = ['#ff6b35','#ff3d00','#ff9800','#ffc107','#ff5722'];
  const cx = Math.random() * window.innerWidth;
  const cy = Math.random() * window.innerHeight * 0.6;
  for (let i = 0; i < 16; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      width:5px; height:5px; border-radius:50%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      pointer-events:none; z-index:101;
    `;
    const angle = (Math.PI * 2 / 16) * i;
    const dist = 50 + Math.random() * 70;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    dot.animate([
      { opacity: 1, transform: 'translate(0,0) scale(1)' },
      { opacity: 0, transform: `translate(${tx}px,${ty}px) scale(0)` }
    ], { duration: 800, easing: 'ease-out' });
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 800);
  }
}
</script>
</body>
</html>
