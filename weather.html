<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌦️ 耶拿天气关怀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#0f0f23;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e0e0e0;overflow-x:hidden;touch-action:manipulation}

.hero{text-align:center;padding:50px 20px 20px;position:relative;z-index:1}
.hero h1{font-size:32px;background:linear-gradient(90deg,#60a5fa,#34d399,#60a5fa);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.hero p{color:#6b7280;font-size:14px;margin-top:8px}

.container{max-width:600px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}

/* Weather main card */
.weather-main{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:36px 24px;text-align:center;margin:20px 0;position:relative;overflow:hidden}
.weather-main::before{content:'';position:absolute;inset:0;pointer-events:none}
.wm-city{font-size:14px;color:#9ca3af;margin-bottom:8px}
.wm-icon{font-size:80px;margin:8px 0}
.wm-temp{font-size:56px;font-weight:800;color:#e0e0e0;line-height:1}
.wm-desc{font-size:16px;color:#9ca3af;margin-top:8px}
.wm-care{background:linear-gradient(135deg,rgba(96,165,250,0.12),rgba(52,211,153,0.12));border:1px solid rgba(96,165,250,0.2);border-radius:16px;padding:18px;margin-top:20px;font-size:15px;color:#60a5fa;line-height:1.8}
.wm-time{font-size:12px;color:#6b7280;margin-top:12px}

/* Details */
.weather-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.wd-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 12px;text-align:center}
.wd-item .icon{font-size:24px;margin-bottom:6px}
.wd-item .val{font-size:18px;font-weight:700;color:#e0e0e0}
.wd-item .lbl{font-size:12px;color:#6b7280;margin-top:4px}

/* Forecast */
.forecast{margin:20px 0}
.forecast h3{color:#c4b5fd;font-size:18px;text-align:center;margin-bottom:14px}
.fc-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.fc-row::-webkit-scrollbar{display:none}
.fc-item{flex:0 0 80px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 8px;text-align:center}
.fc-item .day{font-size:12px;color:#9ca3af;margin-bottom:6px}
.fc-item .icon{font-size:28px;margin:4px 0}
.fc-item .temp{font-size:14px;font-weight:600}
.fc-item .temp-lo{color:#60a5fa;font-size:12px}

/* Clothing suggestion */
.clothing{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;margin:16px 0}
.clothing h3{color:#c4b5fd;font-size:18px;text-align:center;margin-bottom:14px}
.clothing-items{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.cl-item{background:rgba(255,255,255,0.06);border-radius:12px;padding:10px 16px;font-size:14px;display:flex;align-items:center;gap:6px}

/* Loading */
.loading{text-align:center;padding:40px;color:#6b7280;font-size:14px}
.loading .spinner{font-size:32px;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.footer{text-align:center;padding:40px 20px;color:#374151;font-size:13px;position:relative;z-index:1}
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#60a5fa,#34d399);z-index:100;transition:width 0.1s}

@media(max-width:600px){.hero h1{font-size:26px}.wm-temp{font-size:44px}.wm-icon{font-size:64px}.weather-details{gap:8px}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<div class="hero">
  <h1>🌦️ 天气关怀站</h1>
  <p>实时耶拿天气 · 远程帮你看天</p>
</div>

<div class="container">
  <div id="weatherContent">
    <div class="loading"><div class="spinner">🌍</div><p style="margin-top:12px">正在获取耶拿天气...</p></div>
  </div>
</div>

<div class="footer">🌦️ 你那边的天气 · 我比你还在意</div>

<script>
// Berlin coordinates
const LAT=50.93;
const LON=11.59;
const CITY='耶拿 Jena';

const weatherCodes={
  0:{icon:'☀️',desc:'晴朗'},1:{icon:'🌤️',desc:'大部晴'},2:{icon:'⛅',desc:'多云'},3:{icon:'☁️',desc:'阴天'},
  45:{icon:'🌫️',desc:'起雾'},48:{icon:'🌫️',desc:'浓雾'},
  51:{icon:'🌦️',desc:'细雨'},53:{icon:'🌦️',desc:'中雨'},55:{icon:'🌧️',desc:'大雨'},
  56:{icon:'🌨️',desc:'冻雨'},57:{icon:'🌨️',desc:'冻雨'},
  61:{icon:'🌧️',desc:'小雨'},63:{icon:'🌧️',desc:'中雨'},65:{icon:'🌧️',desc:'大雨'},
  66:{icon:'🌨️',desc:'冻雨'},67:{icon:'🌨️',desc:'冻雨'},
  71:{icon:'🌨️',desc:'小雪'},73:{icon:'❄️',desc:'中雪'},75:{icon:'❄️',desc:'大雪'},
  77:{icon:'❄️',desc:'雪粒'},80:{icon:'🌧️',desc:'阵雨'},81:{icon:'🌧️',desc:'中阵雨'},82:{icon:'⛈️',desc:'暴雨'},
  85:{icon:'🌨️',desc:'阵雪'},86:{icon:'❄️',desc:'大阵雪'},
  95:{icon:'⛈️',desc:'雷暴'},96:{icon:'⛈️',desc:'雷暴+冰雹'},99:{icon:'⛈️',desc:'强雷暴'}
};

function getCareMsg(temp,code){
  const msgs=[];
  if(temp<0)msgs.push('❄️ 零下了！多穿点，围巾手套全副武装');
  else if(temp<5)msgs.push('🧣 好冷！记得穿厚外套，带好围巾');
  else if(temp<15)msgs.push('🧥 有点凉，穿件外套出门');
  else if(temp<25)msgs.push('🌸 温度刚好，出去走走吧');
  else msgs.push('☀️ 好热！多喝水，注意防晒');

  if(code>=51&&code<=67)msgs.push('☂️ 记得带伞！出门别忘了');
  if(code>=71&&code<=77)msgs.push('⛄ 下雪了！路滑小心');
  if(code>=95)msgs.push('⚡ 有雷暴，尽量待在室内');
  if(code===0||code===1)msgs.push('💛 天气好心情也好，记得微笑');
  if(code===45||code===48)msgs.push('🚶 有雾注意安全，出行小心');

  return msgs.join('<br>');
}

function getClothing(temp){
  if(temp<0)return['🧥 羽绒服','🧣 围巾','🧤 手套','🧦 厚袜子','🥾 雪地靴'];
  if(temp<10)return['🧥 厚外套','🧣 围巾','👖 长裤','🥾 靴子'];
  if(temp<20)return['🧥 薄外套','👕 长袖','👖 长裤','👟 运动鞋'];
  if(temp<28)return['👕 T恤','👖 短裤/裙子','👟 帆布鞋','🧴 防晒霜'];
  return['👕 短袖','🩳 短裤','🩴 凉鞋','🧴 防晒霜','💧 多喝水'];
}

const dayNames=['周日','周一','周二','周三','周四','周五','周六'];

async function fetchWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Berlin&forecast_days=7`;
    const res=await fetch(url);
    const data=await res.json();
    renderWeather(data);
  }catch(e){
    document.getElementById('weatherContent').innerHTML=`<div class="weather-main"><div class="wm-icon">😅</div><div class="wm-desc">获取天气失败，请检查网络</div><div class="wm-care" style="margin-top:16px">不过不管什么天气，我都想你 💕<br>稍后再试试刷新页面</div></div>`;
  }
}

function renderWeather(data){
  const cur=data.current;
  const daily=data.daily;
  const temp=Math.round(cur.temperature_2m);
  const feelsLike=Math.round(cur.apparent_temperature);
  const humidity=cur.relative_humidity_2m;
  const wind=Math.round(cur.wind_speed_10m);
  const code=cur.weather_code;
  const w=weatherCodes[code]||{icon:'🌍',desc:'未知'};
  const clothing=getClothing(temp);

  let forecastHTML=daily.time.map((t,i)=>{
    const d=new Date(t);
    const fc=weatherCodes[daily.weather_code[i]]||{icon:'🌍'};
    return `<div class="fc-item"><div class="day">${i===0?'今天':dayNames[d.getDay()]}</div><div class="icon">${fc.icon}</div><div class="temp">${Math.round(daily.temperature_2m_max[i])}°</div><div class="temp-lo">${Math.round(daily.temperature_2m_min[i])}°</div></div>`;
  }).join('');

  const now=new Date();
  const deTime=now.toLocaleString('zh-CN',{timeZone:'Europe/Berlin',hour:'2-digit',minute:'2-digit',hour12:false});

  document.getElementById('weatherContent').innerHTML=`
    <div class="weather-main">
      <div class="wm-city">📍 ${CITY} · 德国时间 ${deTime}</div>
      <div class="wm-icon">${w.icon}</div>
      <div class="wm-temp">${temp}°C</div>
      <div class="wm-desc">${w.desc} · 体感 ${feelsLike}°C</div>
      <div class="wm-care">${getCareMsg(temp,code)}</div>
      <div class="wm-time">数据更新于刚刚</div>
    </div>
    <div class="weather-details">
      <div class="wd-item"><div class="icon">💧</div><div class="val">${humidity}%</div><div class="lbl">湿度</div></div>
      <div class="wd-item"><div class="icon">💨</div><div class="val">${wind}km/h</div><div class="lbl">风速</div></div>
      <div class="wd-item"><div class="icon">🌡️</div><div class="val">${feelsLike}°</div><div class="lbl">体感</div></div>
    </div>
    <div class="forecast"><h3>📅 未来7天</h3><div class="fc-row">${forecastHTML}</div></div>
    <div class="clothing"><h3>👗 今天穿什么</h3><div class="clothing-items">${clothing.map(c=>`<div class="cl-item">${c}</div>`).join('')}</div></div>
  `;
}

fetchWeather();

// Progress
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const p=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100;
  document.getElementById('progress').style.width=p+'%';
},{passive:true});
</script>
</body>
</html>
