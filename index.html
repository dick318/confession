<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💕 给你做的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#0a0a0f;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e0e0e0;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;touch-action:manipulation}

body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(120,40,200,0.15),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,60,100,0.1),transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(0,150,255,0.08),transparent 50%);z-index:0;animation:bgShift 10s ease-in-out infinite alternate}
@keyframes bgShift{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}

.hero{text-align:center;position:relative;z-index:1;margin-top:50px;margin-bottom:24px;padding:0 20px}
.hero h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,#ff6b9d,#c084fc,#60a5fa,#34d399);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradient 5s ease infinite}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hero p{color:#6b7280;font-size:15px;margin-top:10px}

.grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:520px;width:100%;padding:0 16px}

.card{position:relative;border-radius:20px;padding:28px 20px;text-align:center;cursor:pointer;text-decoration:none;color:#fff;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);overflow:hidden;border:1px solid rgba(255,255,255,0.06);-webkit-user-select:none;user-select:none}
.card:active{transform:scale(0.95) !important;transition:all 0.1s}
.card:hover{transform:translateY(-4px) scale(1.01);border-color:rgba(255,255,255,0.15)}
.card .icon{font-size:40px;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3))}
.card .name{font-size:16px;font-weight:700;margin-bottom:4px}
.card .desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5}

.card-love{background:linear-gradient(135deg,rgba(236,72,153,0.2),rgba(168,85,247,0.15))}
.card-guide{background:linear-gradient(135deg,rgba(88,166,255,0.2),rgba(6,182,212,0.15))}
.card-phd{background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(139,92,246,0.15))}
.card-surprise{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(239,68,68,0.15))}
.card-calendar{background:linear-gradient(135deg,rgba(244,114,182,0.2),rgba(167,139,250,0.15))}
.card-music{background:linear-gradient(135deg,rgba(6,182,212,0.2),rgba(139,92,246,0.15))}
.card-letters{background:linear-gradient(135deg,rgba(236,72,153,0.2),rgba(249,115,22,0.15))}
.card-weather{background:linear-gradient(135deg,rgba(96,165,250,0.2),rgba(52,211,153,0.15))}
.card-album{background:linear-gradient(135deg,rgba(249,115,22,0.2),rgba(236,72,153,0.15))}
.card-games{background:linear-gradient(135deg,rgba(250,204,21,0.2),rgba(249,115,22,0.15))}
.card-motivation{background:linear-gradient(135deg,rgba(52,211,153,0.2),rgba(6,182,212,0.15))}
.card-confession{background:linear-gradient(135deg,rgba(233,30,99,0.2),rgba(156,39,176,0.15))}

.card{animation:cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.card:nth-child(1){animation-delay:0.05s}
.card:nth-child(2){animation-delay:0.1s}
.card:nth-child(3){animation-delay:0.15s}
.card:nth-child(4){animation-delay:0.2s}
.card:nth-child(5){animation-delay:0.25s}
.card:nth-child(6){animation-delay:0.3s}
.card:nth-child(7){animation-delay:0.35s}
.card:nth-child(8){animation-delay:0.4s}
.card:nth-child(9){animation-delay:0.45s}
.card:nth-child(10){animation-delay:0.5s}
.card:nth-child(11){animation-delay:0.55s}
.card:nth-child(12){animation-delay:0.6s}
@keyframes cardPop{from{opacity:0;transform:translateY(20px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}

.footer{position:relative;z-index:1;margin-top:30px;margin-bottom:30px;text-align:center;color:#374151;font-size:13px}

.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particles span{position:absolute;font-size:14px;animation:pFloat linear infinite;opacity:0.08}
@keyframes pFloat{0%{transform:translateY(100vh) rotate(0)}100%{transform:translateY(-10vh) rotate(360deg)}}

.click-heart{position:fixed;pointer-events:none;font-size:22px;z-index:50;animation:clickPop 0.7s ease-out forwards}
@keyframes clickPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}

@media(max-width:600px){.hero h1{font-size:28px}.hero{margin-top:36px}.card{padding:22px 16px}.card .icon{font-size:36px}.card .name{font-size:15px}}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="hero">
  <h1>💕 给你做的小站</h1>
  <p>每个页面都是一份心意 · 点哪个都是惊喜</p>
</div>

<div class="grid">
  <a class="card card-confession" href="confession.html">
    <div class="icon">💘</div>
    <div class="name">表白的那天</div>
    <div class="desc">那些害羞说出口的话</div>
  </a>
  <a class="card card-love" href="love.html">
    <div class="icon">🌍</div>
    <div class="name">异地恋指南</div>
    <div class="desc">8000公里的距离，0公里的心</div>
  </a>
  <a class="card card-calendar" href="calendar.html">
    <div class="icon">📅</div>
    <div class="name">我们的纪念日</div>
    <div class="desc">每一个日子都值得铭记</div>
  </a>
  <a class="card card-letters" href="letters.html">
    <div class="icon">💌</div>
    <div class="name">给你的信</div>
    <div class="desc">每封信都是心里话</div>
  </a>
  <a class="card card-music" href="music.html">
    <div class="icon">🎵</div>
    <div class="name">我们的音乐盒</div>
    <div class="desc">每首歌都藏着关于你的故事</div>
  </a>
  <a class="card card-weather" href="weather.html">
    <div class="icon">🌦️</div>
    <div class="name">天气关怀站</div>
    <div class="desc">远程帮你看天气</div>
  </a>
  <a class="card card-album" href="album.html">
    <div class="icon">📸</div>
    <div class="name">我们的回忆</div>
    <div class="desc">每张照片都是故事</div>
  </a>
  <a class="card card-guide" href="guide.html">
    <div class="icon">🇩🇪</div>
    <div class="name">德国生存指南</div>
    <div class="desc">在德国活下来的每天都是胜利</div>
  </a>
  <a class="card card-phd" href="phd.html">
    <div class="icon">🧪</div>
    <div class="name">博士摸鱼宝典</div>
    <div class="desc">论文可以晚点写，快乐不能等</div>
  </a>
  <a class="card card-motivation" href="motivation.html">
    <div class="icon">💪</div>
    <div class="name">博士生存力量</div>
    <div class="desc">你比想象中更厉害</div>
  </a>
  <a class="card card-games" href="games.html">
    <div class="icon">🧩</div>
    <div class="name">小游戏合集</div>
    <div class="desc">读博间隙·休息五分钟</div>
  </a>
  <a class="card card-surprise" href="surprise.html">
    <div class="icon">🎲</div>
    <div class="name">随机惊喜</div>
    <div class="desc">每次打开都不一样</div>
  </a>
</div>

<div class="footer">每个页面都是为你做的 💕</div>

<script>
(function(){
  const bg=document.getElementById('particles');
  const e=['💗','✨','💕','🌟','💖','⭐'];
  for(let i=0;i<20;i++){
    const s=document.createElement('span');
    s.textContent=e[Math.floor(Math.random()*e.length)];
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(10+Math.random()*15)+'s';
    s.style.animationDelay=Math.random()*12+'s';
    bg.appendChild(s);
  }
})();

document.addEventListener('click',function(e){
  if(e.target.closest('.card'))return;
  const h=document.createElement('div');
  h.className='click-heart';
  h.textContent=['💗','✨','💕'][Math.floor(Math.random()*3)];
  h.style.left=e.clientX+'px';h.style.top=e.clientY+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),700);
});
</script>
</body>
</html>
