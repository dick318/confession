<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 给你的一封信</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 30%, #e8eaf6 60%, #e0f7fa 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .hearts-bg span {
    position: absolute;
    font-size: 20px;
    animation: float-up linear infinite;
    opacity: 0;
  }
  @keyframes float-up {
    0%   { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative; z-index: 1;
    max-width: 560px;
    margin: 80px auto;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow: 0 20px 60px rgba(233,30,99,0.12), 0 4px 20px rgba(0,0,0,0.06);
    text-align: center;
    animation: card-in 1s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .emoji-big {
    font-size: 72px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.15); }
  }

  h1 {
    margin: 24px 0 8px;
    font-size: 28px;
    background: linear-gradient(90deg, #e91e63, #9c27b0, #e91e63);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .subtitle {
    color: #999;
    font-size: 14px;
    margin-bottom: 28px;
  }

  .message {
    font-size: 17px;
    line-height: 2;
    color: #444;
    text-align: left;
    padding: 0 8px;
  }
  .message p { margin-bottom: 12px; }

  .highlight {
    color: #e91e63;
    font-weight: 600;
  }

  /* Button area */
  .btn-area {
    margin-top: 36px;
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }
  .btn-yes {
    background: linear-gradient(135deg, #e91e63, #c2185b);
    color: #fff;
    box-shadow: 0 6px 20px rgba(233,30,99,0.35);
  }
  .btn-yes:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 10px 30px rgba(233,30,99,0.45);
  }
  .btn-no {
    background: #f5f5f5;
    color: #888;
    position: relative;
  }
  .btn-no:hover {
    /* runaway effect handled by JS */
  }

  /* Celebration overlay */
  .celebrate {
    display: none;
    position: fixed; inset: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: fade-in 0.6s;
  }
  .celebrate.show { display: flex; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .celebrate .big-heart {
    font-size: 120px;
    animation: heart-beat 0.8s ease-in-out infinite alternate;
  }
  @keyframes heart-beat {
    from { transform: scale(1); }
    to   { transform: scale(1.3); }
  }
  .celebrate h2 {
    margin-top: 24px;
    font-size: 32px;
    color: #e91e63;
  }
  .celebrate p {
    margin-top: 12px;
    color: #888;
    font-size: 16px;
  }

  /* Fireworks */
  .firework {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
    z-index: 101;
    pointer-events: none;
  }
  @keyframes explode {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  .signature {
    margin-top: 32px;
    text-align: right;
    color: #bbb;
    font-size: 13px;
    font-style: italic;
  }

  /* Click effect */
  .click-heart {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    z-index: 50;
    animation: click-pop 0.8s ease-out forwards;
  }
  @keyframes click-pop {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  @media (max-width: 600px) {
    .card { margin: 40px 16px; padding: 32px 24px; }
    h1 { font-size: 22px; }
    .message { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Main card -->
<div class="card">
  <div class="emoji-big">💌</div>
  <h1>有些话，想对你说</h1>
  <p class="subtitle">— 点开这封信的人，是你</p>

  <div class="message">
    <p>我不知道从什么时候开始，</p>
    <p>手机响起第一个念头是<span class="highlight">会不会是你</span>。</p>
    <p>走过好看的街，吃到好吃的东西，</p>
    <p>心里想的都是<span class="highlight">如果和你一起就好了</span>。</p>
    <p>&nbsp;</p>
    <p>我不是一个很会表达的人，</p>
    <p>但喜欢你这件事，我想认真地说一次：</p>
    <p>&nbsp;</p>
    <p style="text-align:center;font-size:20px;font-weight:700;color:#e91e63;">
      我喜欢你。<br>非常、非常喜欢你。
    </p>
  </div>

  <div class="btn-area">
    <button class="btn btn-yes" onclick="sayYes()">💛 我也是</button>
    <button class="btn btn-no" id="noBtn" onmouseover="runAway()" onclick="runAway()">再想想</button>
  </div>

  <div class="signature">— 写给你的一封信 💕</div>
</div>

<!-- Celebration -->
<div class="celebrate" id="celebrate">
  <div class="big-heart">💖</div>
  <h2>那说好了哦！</h2>
  <p>从今天起，我们一起走 ♡</p>
</div>

<script>
// Generate floating hearts
(function() {
  const bg = document.getElementById('heartsBg');
  const hearts = ['💗','💕','💖','💘','💓','🩷','🤍'];
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('span');
    s.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    s.style.left = Math.random() * 100 + '%';
    s.style.fontSize = (14 + Math.random() * 20) + 'px';
    s.style.animationDuration = (6 + Math.random() * 8) + 's';
    s.style.animationDelay = (Math.random() * 10) + 's';
    bg.appendChild(s);
  }
})();

// Click hearts anywhere
document.addEventListener('click', function(e) {
  const h = document.createElement('div');
  h.className = 'click-heart';
  h.textContent = ['💗','💕','✨','💖'][Math.floor(Math.random()*4)];
  h.style.left = e.clientX + 'px';
  h.style.top = e.clientY + 'px';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 800);
});

// No button runs away
let noCount = 0;
const noTexts = ['再想想','真的不再想想吗？','跑不掉的～','确定不要？','你逃不掉的 😏','好吧好吧…'];
function runAway() {
  const btn = document.getElementById('noBtn');
  noCount = Math.min(noCount + 1, noTexts.length - 1);
  btn.textContent = noTexts[noCount];
  const x = (Math.random() - 0.5) * 200;
  const y = (Math.random() - 0.5) * 120;
  btn.style.transform = `translate(${x}px, ${y}px)`;
  btn.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
}

// Say yes!
function sayYes() {
  const c = document.getElementById('celebrate');
  c.classList.add('show');
  // Fireworks
  for (let b = 0; b < 8; b++) {
    setTimeout(() => firework(), b * 200);
  }
}
function firework() {
  const colors = ['#e91e63','#9c27b0','#ff5722','#ff9800','#4caf50','#2196f3'];
  const cx = Math.random() * window.innerWidth;
  const cy = Math.random() * window.innerHeight * 0.6;
  for (let i = 0; i < 20; i++) {
    const dot = document.createElement('div');
    dot.className = 'firework';
    dot.style.left = cx + 'px';
    dot.style.top = cy + 'px';
    dot.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = (Math.PI * 2 / 20) * i;
    const dist = 60 + Math.random() * 80;
    dot.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    dot.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 1000);
  }
}
</script>
</body>
</html>
