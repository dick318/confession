<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧩 小游戏合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#0a0a1a;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e0e0e0;overflow-x:hidden;touch-action:manipulation}
.hero{text-align:center;padding:50px 20px 20px;position:relative;z-index:1}
.hero h1{font-size:32px;background:linear-gradient(90deg,#facc15,#f97316,#ef4444);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.hero p{color:#6b7280;font-size:14px;margin-top:8px}
.container{max-width:600px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}
.game-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.g-tab{padding:10px 18px;border-radius:16px;font-size:14px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#9ca3af;cursor:pointer;transition:all 0.2s;font-family:inherit;-webkit-user-select:none;user-select:none}
.g-tab:active{transform:scale(0.93)}
.g-tab.active{background:rgba(250,204,21,0.15);border-color:#facc15;color:#facc15}
.game-area{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;margin:16px 0;min-height:300px}
.game-area h3{color:#facc15;text-align:center;margin-bottom:16px;font-size:18px}
.game-info{text-align:center;color:#9ca3af;font-size:14px;margin-bottom:16px}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;margin:0 auto}
.mem-card{aspect-ratio:1;border-radius:12px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.3s;-webkit-user-select:none;user-select:none}
.mem-card:active{transform:scale(0.92)}
.mem-card.hidden{font-size:0}.mem-card.hidden::after{content:'❓';font-size:24px}
.mem-card.matched{background:rgba(52,211,153,0.15);border-color:#34d399;cursor:default}
.reaction-zone{width:200px;height:200px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;cursor:pointer;-webkit-user-select:none;user-select:none}
.rz-wait{background:rgba(239,68,68,0.2);border:2px solid #ef4444;color:#ef4444}
.rz-go{background:rgba(52,211,153,0.2);border:2px solid #34d399;color:#34d399}
.rz-result{background:rgba(139,92,246,0.2);border:2px solid #8b5cf6;color:#c4b5fd}
.catch-area{position:relative;width:100%;height:280px;background:rgba(0,0,0,0.2);border-radius:16px;overflow:hidden;-webkit-user-select:none;user-select:none}
.catch-emoji{position:absolute;font-size:36px;cursor:pointer;animation:catchFall linear forwards}
@keyframes catchFall{0%{transform:translateY(-50px)}100%{transform:translateY(330px)}}
.score-bar{display:flex;justify-content:center;gap:24px;margin:16px 0;text-align:center}
.score-item .val{font-size:24px;font-weight:700;color:#facc15}
.score-item .lbl{font-size:12px;color:#6b7280}
.btn{padding:12px 28px;border:none;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(0.93)!important}
.btn-game{background:linear-gradient(135deg,#facc15,#f97316);color:#1a1a2e}
.btn-small{background:rgba(255,255,255,0.06);color:#facc15;border:1px solid rgba(250,204,21,0.3);padding:8px 20px;font-size:13px}
.footer{text-align:center;padding:40px 20px;color:#374151;font-size:13px;position:relative;z-index:1}
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#facc15,#f97316);z-index:100;transition:width 0.1s}
.canvas-wrap{display:flex;justify-content:center;max-width:100%;margin:18px auto 0}
.canvas-wrap.square{max-width:320px}
.game-canvas{display:block;width:100%;height:auto;border-radius:18px;border:1px solid rgba(250,204,21,0.14);background:radial-gradient(circle at top,#1f2937,#0f172a 58%,#020617);box-shadow:inset 0 1px 0 rgba(255,255,255,0.05)}
.snake-controls{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:18px}
.snake-hint{font-size:12px;color:#6b7280}
.snake-pad{display:grid;grid-template-columns:repeat(3,56px);gap:8px}
.d-btn{width:56px;height:56px;border-radius:18px;border:1px solid rgba(250,204,21,0.28);background:rgba(250,204,21,0.12);color:#facc15;font-size:24px;font-weight:700;cursor:pointer;font-family:inherit}
.d-btn:active{transform:scale(0.92)}
.d-space{visibility:hidden}
.mine-grid{display:grid;grid-template-columns:repeat(8,36px);gap:4px;justify-content:center;max-width:320px;margin:0 auto}
.mine-cell{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#e5e7eb;cursor:pointer;font-family:inherit;padding:0;-webkit-user-select:none;user-select:none}
.mine-cell:active{transform:scale(0.95)}
.mine-cell.revealed{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.08)}
.mine-cell.flagged{background:rgba(250,204,21,0.16);color:#facc15;border-color:rgba(250,204,21,0.3)}
.mine-cell.mine{background:rgba(239,68,68,0.2);color:#f87171;border-color:rgba(239,68,68,0.3)}
.mine-cell[data-count="1"]{color:#60a5fa}
.mine-cell[data-count="2"]{color:#4ade80}
.mine-cell[data-count="3"]{color:#f87171}
.mine-cell[data-count="4"]{color:#c084fc}
.mine-cell[data-count="5"]{color:#f97316}
.mine-cell[data-count="6"]{color:#22d3ee}
.mine-cell[data-count="7"]{color:#f9fafb}
.mine-cell[data-count="8"]{color:#facc15}
.breakout-tip{text-align:center;color:#6b7280;font-size:13px;margin-top:12px}

/* Guess number */
.guess-input{width:120px;padding:12px;border-radius:12px;border:2px solid rgba(250,204,21,0.3);background:rgba(255,255,255,0.06);color:#facc15;font-size:24px;text-align:center;font-family:inherit;font-weight:700;outline:none;transition:border-color 0.3s}
.guess-input:focus{border-color:#facc15}
.guess-history{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.guess-tag{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
.guess-tag.high{background:rgba(239,68,68,0.15);color:#f87171}
.guess-tag.low{background:rgba(96,165,250,0.15);color:#60a5fa}
.guess-tag.hit{background:rgba(52,211,153,0.2);color:#34d399}

/* Simon colors */
.simon-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:240px;margin:0 auto}
.simon-btn{aspect-ratio:1;border-radius:16px;border:2px solid transparent;cursor:pointer;transition:all 0.15s;opacity:0.5}
.simon-btn:active{transform:scale(0.92)}
.simon-btn.lit{opacity:1;transform:scale(1.05);box-shadow:0 0 20px currentColor}
.simon-btn[data-c="0"]{background:#ef4444;color:#ef4444}
.simon-btn[data-c="1"]{background:#3b82f6;color:#3b82f6}
.simon-btn[data-c="2"]{background:#22c55e;color:#22c55e}
.simon-btn[data-c="3"]{background:#facc15;color:#facc15}

/* Typing */
.type-display{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;text-align:center;font-size:20px;line-height:1.8;margin-bottom:16px;min-height:80px;color:#6b7280;letter-spacing:1px}
.type-display .done{color:#34d399}
.type-display .cur{color:#facc15;border-bottom:2px solid #facc15}
.type-display .rest{color:#4b5563}
.type-input{width:100%;padding:14px;border-radius:12px;border:2px solid rgba(250,204,21,0.2);background:rgba(255,255,255,0.04);color:#e0e0e0;font-size:16px;font-family:inherit;outline:none;text-align:center;transition:border-color 0.3s}
.type-input:focus{border-color:#facc15}
.type-timer{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);margin:12px 0;overflow:hidden}
.type-timer-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#34d399,#facc15,#ef4444);transition:width 0.1s linear}

@media(max-width:600px){.hero h1{font-size:26px}.memory-grid{max-width:280px;gap:6px}.simon-grid{max-width:200px}.snake-pad{grid-template-columns:repeat(3,48px)}.d-btn{width:48px;height:48px;border-radius:16px;font-size:22px}.mine-grid{grid-template-columns:repeat(8,minmax(0,1fr));max-width:320px}.mine-cell{width:100%;height:auto;aspect-ratio:1}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="hero"><h1>🧩 小游戏合集</h1><p>读博间隙·休息五分钟🧡</p></div>
<div class="container">
<div class="game-tabs">
<button class="g-tab active" data-game="memory">🧠 记忆翻牌</button>
<button class="g-tab" data-game="reaction">⚡ 反应测试</button>
<button class="g-tab" data-game="catch">🎯 接Emoji</button>
<button class="g-tab" data-game="guess">🔢 猜数字</button>
<button class="g-tab" data-game="simon">🎨 颜色记忆</button>
<button class="g-tab" data-game="typing">✍️ 情话打字</button>
<button class="g-tab" data-game="snake">🐍 贪吃蛇</button>
<button class="g-tab" data-game="mine">💣 迷你扫雷</button>
<button class="g-tab" data-game="runner">🏃 跳跳小人</button>
<button class="g-tab" data-game="breakout">🏓 弹球打砖块</button>
</div>
<div class="game-area" id="gameArea"></div>
</div>
<div class="footer">🧩 玩完了就回去写论文 · 但先玩完再说</div>
<script>
let currentGame='memory',gameCleanups=[];
function addGameCleanup(fn){gameCleanups.push(fn);}
function runGameCleanups(){
while(gameCleanups.length){
const cleanup=gameCleanups.pop();
try{cleanup&&cleanup();}catch(err){console.error(err);}
}
}
document.querySelector('.game-tabs').addEventListener('click',function(e){
const btn=e.target.closest('.g-tab');if(!btn)return;
document.querySelectorAll('.g-tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');currentGame=btn.dataset.game;loadGame();
});
function loadGame(){
runGameCleanups();
if(currentGame==='memory')initMemory();
else if(currentGame==='reaction')initReaction();
else if(currentGame==='catch')initCatch();
else if(currentGame==='guess')initGuess();
else if(currentGame==='simon')initSimon();
else if(currentGame==='typing')initTyping();
else if(currentGame==='snake')initSnake();
else if(currentGame==='mine')initMine();
else if(currentGame==='runner')initRunner();
else if(currentGame==='breakout')initBreakout();
}

// ============ MEMORY ============
const memEmojis=['🐱','🐶','🐻','🐼','🦊','🐰','🐸','🦄'];
let memFlipped=[],memMatched=0,memMoves=0,memLocked=false;
function initMemory(){
memMatched=0;memMoves=0;memLocked=false;memFlipped=[];
const pairs=[...memEmojis,...memEmojis].sort(()=>Math.random()-0.5);
const a=document.getElementById('gameArea');
a.innerHTML='<h3>🧠 记忆翻牌</h3><div class="game-info">找到所有配对</div><div class="score-bar"><div class="score-item"><div class="val" id="mMoves">0</div><div class="lbl">步数</div></div><div class="score-item"><div class="val" id="mPairs">0/8</div><div class="lbl">配对</div></div></div><div class="memory-grid" id="mGrid"></div><div style="text-align:center;margin-top:16px"><button class="btn btn-small" onclick="initMemory()">🔄 重开</button></div>';
document.getElementById('mGrid').innerHTML=pairs.map((c,i)=>'<div class="mem-card hidden" data-i="'+i+'" data-e="'+c+'"></div>').join('');
document.getElementById('mGrid').onclick=function(e){
const c=e.target.closest('.mem-card');
if(!c||memLocked||c.classList.contains('matched')||!c.classList.contains('hidden'))return;
c.classList.remove('hidden');c.textContent=c.dataset.e;memFlipped.push(c);
if(memFlipped.length===2){memMoves++;document.getElementById('mMoves').textContent=memMoves;memLocked=true;
const[a,b]=memFlipped;
if(a.dataset.e===b.dataset.e){a.classList.add('matched');b.classList.add('matched');memMatched++;document.getElementById('mPairs').textContent=memMatched+'/8';memFlipped=[];memLocked=false;
if(memMatched===8)setTimeout(()=>document.querySelector('.game-info').innerHTML='🎉 '+memMoves+'步完成！',300);
}else{setTimeout(()=>{a.classList.add('hidden');a.textContent='';b.classList.add('hidden');b.textContent='';memFlipped=[];memLocked=false;},600);}}};
}

// ============ REACTION ============
let rTimeout,rStart;
function initReaction(){
const best=localStorage.getItem('rBest')||'---';
document.getElementById('gameArea').innerHTML='<h3>⚡ 反应速度</h3><div class="game-info">等绿色出现后立刻点击</div><div class="score-bar"><div class="score-item"><div class="val" id="rTime">---</div><div class="lbl">毫秒</div></div><div class="score-item"><div class="val" id="rBest">'+best+'</div><div class="lbl">最佳</div></div></div><div class="reaction-zone rz-result" id="rZone">点击开始</div>';
document.getElementById('rZone').onclick=function(){
const z=this;
if(z.classList.contains('rz-result')){z.className='reaction-zone rz-wait';z.textContent='等待...';clearTimeout(rTimeout);
rTimeout=setTimeout(()=>{z.className='reaction-zone rz-go';z.textContent='点我！';rStart=performance.now();},1500+Math.random()*3000);
}else if(z.classList.contains('rz-wait')){clearTimeout(rTimeout);z.className='reaction-zone rz-result';z.textContent='太早了！重来';
}else if(z.classList.contains('rz-go')){const t=Math.round(performance.now()-rStart);z.className='reaction-zone rz-result';z.textContent=t+'ms · 再来';document.getElementById('rTime').textContent=t;
const b=localStorage.getItem('rBest');if(!b||t<parseInt(b)){localStorage.setItem('rBest',t);document.getElementById('rBest').textContent=t;}}};
}

// ============ CATCH ============
let cScore,cMiss,cIv,cActive=false;
function initCatch(){
cScore=0;cMiss=0;cActive=false;
const best=localStorage.getItem('cBest')||'0';
document.getElementById('gameArea').innerHTML='<h3>🎯 接住爱心</h3><div class="game-info" id="cInfo">点击掉落的爱心，漏5个结束</div><div class="score-bar"><div class="score-item"><div class="val" id="cScore">0</div><div class="lbl">得分</div></div><div class="score-item"><div class="val" id="cMiss">0/5</div><div class="lbl">失误</div></div><div class="score-item"><div class="val" id="cBest">'+best+'</div><div class="lbl">最高</div></div></div><div class="catch-area" id="cZone"></div><div style="text-align:center;margin-top:16px"><button class="btn btn-game" id="cBtn" onclick="startCatch()">▶ 开始</button></div>';
}
function startCatch(){
if(cActive)return;cActive=true;cScore=0;cMiss=0;
document.getElementById('cScore').textContent=0;document.getElementById('cMiss').textContent='0/5';
document.getElementById('cInfo').textContent='点击爱心！';document.getElementById('cBtn').textContent='游戏中...';
document.getElementById('cZone').innerHTML='';
cIv=setInterval(()=>{if(!cActive)return;
const z=document.getElementById('cZone');if(!z)return;
const em=document.createElement('div');em.className='catch-emoji';
em.textContent=['💗','💕','💖','🩷','💝','⭐'][Math.floor(Math.random()*6)];
em.style.left=Math.random()*85+'%';em.style.animationDuration=(2+Math.random()*1.5)+'s';
em.onclick=function(e){e.stopPropagation();cScore++;document.getElementById('cScore').textContent=cScore;em.remove();};
em.addEventListener('animationend',function(){em.remove();if(!cActive)return;cMiss++;document.getElementById('cMiss').textContent=cMiss+'/5';if(cMiss>=5)endCatch();});
z.appendChild(em);},800);
}
function endCatch(){cActive=false;clearInterval(cIv);
document.getElementById('cInfo').innerHTML='结束！得分 <b>'+cScore+'</b>';document.getElementById('cBtn').textContent='🔄 再来';
const b=parseInt(localStorage.getItem('cBest')||'0');
if(cScore>b){localStorage.setItem('cBest',cScore);document.getElementById('cBest').textContent=cScore;document.getElementById('cInfo').innerHTML+=' 🎉 新纪录！';}
}

// ============ SNAKE ============
const snakeFoods=['🍎','🍕','🍩','🍓','🧁','🍪'];
const snakeDirections={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
let snakeState=null;
function initSnake(){
const best=parseInt(localStorage.getItem('snakeBest')||'0');
const a=document.getElementById('gameArea');
a.innerHTML='<h3>🐍 贪吃蛇</h3><div class="game-info" id="snakeInfo">方向键或下方按钮控制，吃到 5 个食物会加速</div><div class="score-bar"><div class="score-item"><div class="val" id="snakeScore">0</div><div class="lbl">得分</div></div><div class="score-item"><div class="val" id="snakeBest">'+best+'</div><div class="lbl">最高</div></div><div class="score-item"><div class="val" id="snakeSpeed">150</div><div class="lbl">步频(ms)</div></div></div><div class="canvas-wrap square"><canvas class="game-canvas" id="snakeCanvas" width="300" height="300" aria-label="贪吃蛇游戏画布"></canvas></div><div class="snake-controls" id="snakeControls"><div class="snake-hint">手机可直接点按方向键</div><div class="snake-pad"><span class="d-space"></span><button class="d-btn" type="button" data-dir="up">↑</button><span class="d-space"></span><button class="d-btn" type="button" data-dir="left">←</button><span class="d-space"></span><button class="d-btn" type="button" data-dir="right">→</button><span class="d-space"></span><button class="d-btn" type="button" data-dir="down">↓</button><span class="d-space"></span></div></div><div style="text-align:center;margin-top:16px"><button class="btn btn-small" onclick="currentGame=\'snake\';loadGame()">🔄 重开</button></div>';
const canvas=document.getElementById('snakeCanvas');
const ctx=canvas.getContext('2d');
snakeState={
canvas,
ctx,
size:15,
cell:20,
snake:[{x:7,y:7},{x:6,y:7},{x:5,y:7}],
dir:{x:1,y:0},
nextDir:{x:1,y:0},
food:null,
score:0,
best,
speed:150,
timer:null,
isOver:false
};
snakeState.food=createSnakeFood(snakeState);
const keyHandler=function(e){
const dir=getSnakeDirectionByKey(e.key);
if(!dir||!snakeState)return;
e.preventDefault();
queueSnakeTurn(dir);
};
document.addEventListener('keydown',keyHandler);
document.getElementById('snakeControls').addEventListener('click',function(e){
const btn=e.target.closest('[data-dir]');
if(!btn||!snakeState)return;
queueSnakeTurn(snakeDirections[btn.dataset.dir]);
});
startSnakeLoop();
drawSnake();
const state=snakeState;
addGameCleanup(function(){
clearInterval(state.timer);
document.removeEventListener('keydown',keyHandler);
if(snakeState===state)snakeState=null;
});
}
function getSnakeDirectionByKey(key){
if(key==='ArrowUp'||key==='w'||key==='W')return snakeDirections.up;
if(key==='ArrowDown'||key==='s'||key==='S')return snakeDirections.down;
if(key==='ArrowLeft'||key==='a'||key==='A')return snakeDirections.left;
if(key==='ArrowRight'||key==='d'||key==='D')return snakeDirections.right;
return null;
}
function queueSnakeTurn(dir){
if(!snakeState||snakeState.isOver)return;
const activeDir=snakeState.nextDir;
if(dir.x===-activeDir.x&&dir.y===-activeDir.y)return;
snakeState.nextDir={x:dir.x,y:dir.y};
}
function startSnakeLoop(){
if(!snakeState)return;
clearInterval(snakeState.timer);
snakeState.timer=setInterval(stepSnake,snakeState.speed);
document.getElementById('snakeSpeed').textContent=snakeState.speed;
}
function createSnakeFood(state){
let x=0,y=0;
do{
x=Math.floor(Math.random()*state.size);
y=Math.floor(Math.random()*state.size);
}while(state.snake.some(seg=>seg.x===x&&seg.y===y));
return{x,y,emoji:snakeFoods[Math.floor(Math.random()*snakeFoods.length)]};
}
function stepSnake(){
const state=snakeState;
if(!state||state.isOver)return;
state.dir={x:state.nextDir.x,y:state.nextDir.y};
const head={x:state.snake[0].x+state.dir.x,y:state.snake[0].y+state.dir.y};
const willEat=head.x===state.food.x&&head.y===state.food.y;
const collisionBody=willEat?state.snake:state.snake.slice(0,-1);
if(head.x<0||head.x>=state.size||head.y<0||head.y>=state.size||collisionBody.some(seg=>seg.x===head.x&&seg.y===head.y)){
endSnake();
return;
}
state.snake.unshift(head);
if(willEat){
const eatenEmoji=state.food.emoji;
state.score++;
document.getElementById('snakeScore').textContent=state.score;
if(state.score>state.best){
state.best=state.score;
localStorage.setItem('snakeBest',state.best);
document.getElementById('snakeBest').textContent=state.best;
}
if(state.score%5===0&&state.speed>60){
state.speed=Math.max(60,state.speed-10);
startSnakeLoop();
}
state.food=createSnakeFood(state);

});
ctx.fillStyle='#facc15';
fillRoundRect(ctx,breakoutState.paddleX-breakoutState.paddleWidth/2,breakoutState.paddleY,breakoutState.paddleWidth,breakoutState.paddleHeight,8,'#facc15');
ctx.beginPath();
ctx.fillStyle='#ffffff';
ctx.arc(breakoutState.ball.x,breakoutState.ball.y,breakoutState.ball.radius,0,Math.PI*2);
ctx.fill();
if(breakoutState.ball.locked&&!breakoutState.over&&!breakoutState.won){
ctx.strokeStyle='rgba(255,255,255,0.25)';
ctx.setLineDash([6,6]);
ctx.beginPath();
ctx.moveTo(breakoutState.ball.x,breakoutState.ball.y);
ctx.lineTo(breakoutState.ball.x,breakoutState.ball.y-80);
ctx.stroke();
ctx.setLineDash([]);
}
}

// ============ GUESS NUMBER ============
let guessAnswer,guessCount,guessOver;
function initGuess(){
guessAnswer=Math.floor(Math.random()*100)+1;
guessCount=0;guessOver=false;
const best=localStorage.getItem('gBest')||'---';
const a=document.getElementById('gameArea');
a.innerHTML='<h3>🔢 猜数字</h3><div class="game-info" id="gInfo">我心里想了一个1~100的数字，猜猜看？</div><div class="score-bar"><div class="score-item"><div class="val" id="gCount">0</div><div class="lbl">次数</div></div><div class="score-item"><div class="val" id="gBest">'+best+'</div><div class="lbl">最少次数</div></div></div><div style="text-align:center"><input type="number" class="guess-input" id="gInput" min="1" max="100" placeholder="?"><div style="margin-top:14px"><button class="btn btn-game" onclick="doGuess()">猜！</button></div><div class="guess-history" id="gHistory"></div><div style="margin-top:16px"><button class="btn btn-small" onclick="initGuess()">🔄 重开</button></div></div>';
document.getElementById('gInput').addEventListener('keydown',function(e){if(e.key==='Enter')doGuess();});
document.getElementById('gInput').focus();
}
function doGuess(){
if(guessOver)return;
const input=document.getElementById('gInput');
const v=parseInt(input.value);
if(isNaN(v)||v<1||v>100){document.getElementById('gInfo').textContent='请输入1~100的数字哦~';return;}
guessCount++;document.getElementById('gCount').textContent=guessCount;
const hist=document.getElementById('gHistory');
if(v===guessAnswer){
  guessOver=true;
  hist.innerHTML+='<span class="guess-tag hit">'+v+' ✅</span>';
  const msgs=['你太聪明了！','厉害厉害！🎉','就知道你行！💕','天才女友！✨'];
  document.getElementById('gInfo').innerHTML='🎉 '+msgs[Math.floor(Math.random()*msgs.length)]+' 用了 <b>'+guessCount+'</b> 次猜中！';
  const b=localStorage.getItem('gBest');
  if(!b||guessCount<parseInt(b)){localStorage.setItem('gBest',guessCount);document.getElementById('gBest').textContent=guessCount;document.getElementById('gInfo').innerHTML+=' 新纪录！';}
}else if(v>guessAnswer){
  hist.innerHTML+='<span class="guess-tag high">'+v+' ⬇️</span>';
  document.getElementById('gInfo').textContent='大了大了~ 再小一点';
}else{
  hist.innerHTML+='<span class="guess-tag low">'+v+' ⬆️</span>';
  document.getElementById('gInfo').textContent='小了小了~ 再大一点';
}
input.value='';input.focus();
}

// ============ SIMON (颜色记忆) ============
let simonSeq=[],simonIdx=0,simonRound=0,simonLocked=false,simonPlayback=false;
function initSimon(){
simonSeq=[];simonRound=0;simonLocked=false;simonPlayback=false;
const best=localStorage.getItem('sBest')||'0';
const a=document.getElementById('gameArea');
a.innerHTML='<h3>🎨 颜色记忆</h3><div class="game-info" id="sInfo">记住颜色顺序，然后按顺序点击</div><div class="score-bar"><div class="score-item"><div class="val" id="sRound">0</div><div class="lbl">轮数</div></div><div class="score-item"><div class="val" id="sBest">'+best+'</div><div class="lbl">最高</div></div></div><div class="simon-grid" id="sGrid"><div class="simon-btn" data-c="0"></div><div class="simon-btn" data-c="1"></div><div class="simon-btn" data-c="2"></div><div class="simon-btn" data-c="3"></div></div><div style="text-align:center;margin-top:16px"><button class="btn btn-game" id="sBtn" onclick="simonNextRound()">▶ 开始</button></div>';
document.getElementById('sGrid').onclick=function(e){
  const b=e.target.closest('.simon-btn');
  if(!b||simonLocked||simonPlayback)return;
  const c=parseInt(b.dataset.c);
  flashSimon(c,200);
  if(c===simonSeq[simonIdx]){
    simonIdx++;
    if(simonIdx===simonSeq.length){
      simonLocked=true;
      document.getElementById('sInfo').textContent='✅ 太棒了！准备下一轮...';
      setTimeout(()=>simonNextRound(),1000);
    }
  }else{
    simonLocked=true;
    document.getElementById('sInfo').innerHTML='❌ 错了！坚持了 <b>'+simonRound+'</b> 轮';
    document.getElementById('sBtn').textContent='🔄 重来';
    document.getElementById('sBtn').onclick=function(){initSimon();};
    const best=parseInt(localStorage.getItem('sBest')||'0');
    if(simonRound>best){localStorage.setItem('sBest',simonRound);document.getElementById('sBest').textContent=simonRound;document.getElementById('sInfo').innerHTML+=' 🎉 新纪录！';}
    simonSeq=[];simonRound=0;
  }
};
}
function simonNextRound(){
simonRound++;simonIdx=0;simonLocked=true;simonPlayback=true;
document.getElementById('sRound').textContent=simonRound;
document.getElementById('sBtn').style.display='none';
simonSeq.push(Math.floor(Math.random()*4));
document.getElementById('sInfo').textContent='👀 看好了...';
let i=0;
const iv=setInterval(()=>{
  if(i>=simonSeq.length){clearInterval(iv);simonLocked=false;simonPlayback=false;document.getElementById('sInfo').textContent='轮到你了！按顺序点击';return;}
  flashSimon(simonSeq[i],400);i++;
},600);
}
function flashSimon(c,dur){
const btns=document.querySelectorAll('.simon-btn');
btns[c].classList.add('lit');
setTimeout(()=>btns[c].classList.remove('lit'),dur);
}

// ============ TYPING (情话打字) ============
const lovePhrases=[
'想你的时候天都是粉色的',
'你笑起来真好看',
'遇见你是最美丽的意外',
'我的世界因为你而完整',
'你是我最甜蜜的心事',
'每天都想见到你',
'有你的日子格外温暖',
'我喜欢你超过昨天',
'和你在一起每天都是情人节',
'你是我写的最美情书',
'余生请多指教',
'你是我的小太阳',
'想和你一起慢慢变老',
'全世界我只要你',
'你的笑容是我的解药',
];
let typePhrase='',typePos=0,typeTimer=null,typeTimeLeft=0,typeTotalTime=0,typeCorrect=0,typeTotal=0,typeActive=false;
function initTyping(){
typeActive=false;clearInterval(typeTimer);
const best=localStorage.getItem('tBest')||'---';
const a=document.getElementById('gameArea');
a.innerHTML='<h3>✍️ 情话打字</h3><div class="game-info" id="tInfo">限时15秒，尽可能多地打出情话</div><div class="score-bar"><div class="score-item"><div class="val" id="tScore">0</div><div class="lbl">完成句数</div></div><div class="score-item"><div class="val" id="tAcc">100%</div><div class="lbl">准确率</div></div><div class="score-item"><div class="val" id="tBest">'+best+'</div><div class="lbl">最高句数</div></div></div><div class="type-display" id="tDisplay">点击下方开始，打出屏幕上的情话 💕</div><div class="type-timer"><div class="type-timer-bar" id="tBar" style="width:100%"></div></div><input type="text" class="type-input" id="tInput" placeholder="点击开始后在这里打字..." disabled><div style="text-align:center;margin-top:14px"><button class="btn btn-game" id="tBtn" onclick="startTyping()">▶ 开始挑战</button></div>';
}
function startTyping(){
if(typeActive)return;
typeActive=true;typeCorrect=0;typeTotal=0;
typeTotalTime=15;typeTimeLeft=typeTotalTime;
document.getElementById('tScore').textContent=0;
document.getElementById('tAcc').textContent='100%';
document.getElementById('tBtn').textContent='挑战中...';
document.getElementById('tInfo').textContent='快打！⌨️';
const input=document.getElementById('tInput');
input.disabled=false;input.value='';input.focus();
nextTypePhrase();
typeTimer=setInterval(()=>{
  typeTimeLeft-=0.1;
  document.getElementById('tBar').style.width=(typeTimeLeft/typeTotalTime*100)+'%';
  if(typeTimeLeft<=0){endTyping();}
},100);
input.oninput=function(){
  const v=input.value;
  const expected=typePhrase.slice(0,v.length);
  typeTotal++;
  if(v===typePhrase){
    typeCorrect+=typePhrase.length;
    typeTotal=typeTotal-1+typePhrase.length;
    const count=parseInt(document.getElementById('tScore').textContent)+1;
    document.getElementById('tScore').textContent=count;
    input.value='';
    nextTypePhrase();
  }else{
    // 实时高亮
    let html='';
    for(let i=0;i<typePhrase.length;i++){
      if(i<v.length){
        html+=(v[i]===typePhrase[i])?'<span class="done">'+typePhrase[i]+'</span>':'<span style="color:#ef4444;text-decoration:underline">'+typePhrase[i]+'</span>';
      }else if(i===v.length){
        html+='<span class="cur">'+typePhrase[i]+'</span>';
      }else{
        html+='<span class="rest">'+typePhrase[i]+'</span>';
      }
    }
    document.getElementById('tDisplay').innerHTML=html;
  }
};
}
function nextTypePhrase(){
typePhrase=lovePhrases[Math.floor(Math.random()*lovePhrases.length)];
typePos=0;
let html='<span class="cur">'+typePhrase[0]+'</span>';
for(let i=1;i<typePhrase.length;i++) html+='<span class="rest">'+typePhrase[i]+'</span>';
document.getElementById('tDisplay').innerHTML=html;
}
function endTyping(){
typeActive=false;clearInterval(typeTimer);
document.getElementById('tBar').style.width='0%';
const input=document.getElementById('tInput');
input.disabled=true;input.oninput=null;
const count=parseInt(document.getElementById('tScore').textContent);
const acc=typeTotal>0?Math.round(typeCorrect/typeTotal*100):100;
document.getElementById('tAcc').textContent=acc+'%';
const msgs=['手速惊人！','太厉害了！✨','情话达人！💕','打字女王！👑'];
document.getElementById('tInfo').innerHTML='⏰ 时间到！完成 <b>'+count+'</b> 句情话 '+msgs[Math.min(count,msgs.length-1)];
document.getElementById('tBtn').textContent='🔄 再来';
const b=localStorage.getItem('tBest');
if(!b||count>parseInt(b)){localStorage.setItem('tBest',count);document.getElementById('tBest').textContent=count;document.getElementById('tInfo').innerHTML+=' 🎉 新纪录！';}
}
