<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧩 小游戏合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#0a0a1a;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e0e0e0;overflow-x:hidden;touch-action:manipulation}
.hero{text-align:center;padding:50px 20px 20px;position:relative;z-index:1}
.hero h1{font-size:32px;background:linear-gradient(90deg,#facc15,#f97316,#ef4444);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.hero p{color:#6b7280;font-size:14px;margin-top:8px}
.container{max-width:600px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}
.game-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.g-tab{padding:10px 18px;border-radius:16px;font-size:14px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#9ca3af;cursor:pointer;transition:all 0.2s;font-family:inherit;-webkit-user-select:none;user-select:none}
.g-tab:active{transform:scale(0.93)}
.g-tab.active{background:rgba(250,204,21,0.15);border-color:#facc15;color:#facc15}
.game-area{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;margin:16px 0;min-height:300px}
.game-area h3{color:#facc15;text-align:center;margin-bottom:16px;font-size:18px}
.game-info{text-align:center;color:#9ca3af;font-size:14px;margin-bottom:16px}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;margin:0 auto}
.mem-card{aspect-ratio:1;border-radius:12px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.3s;-webkit-user-select:none;user-select:none}
.mem-card:active{transform:scale(0.92)}
.mem-card.hidden{font-size:0}.mem-card.hidden::after{content:'❓';font-size:24px}
.mem-card.matched{background:rgba(52,211,153,0.15);border-color:#34d399;cursor:default}
.reaction-zone{width:200px;height:200px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;cursor:pointer;-webkit-user-select:none;user-select:none}
.rz-wait{background:rgba(239,68,68,0.2);border:2px solid #ef4444;color:#ef4444}
.rz-go{background:rgba(52,211,153,0.2);border:2px solid #34d399;color:#34d399}
.rz-result{background:rgba(139,92,246,0.2);border:2px solid #8b5cf6;color:#c4b5fd}
.catch-area{position:relative;width:100%;height:280px;background:rgba(0,0,0,0.2);border-radius:16px;overflow:hidden;-webkit-user-select:none;user-select:none}
.catch-emoji{position:absolute;font-size:36px;cursor:pointer;animation:catchFall linear forwards}
@keyframes catchFall{0%{transform:translateY(-50px)}100%{transform:translateY(330px)}}
.score-bar{display:flex;justify-content:center;gap:24px;margin:16px 0;text-align:center}
.score-item .val{font-size:24px;font-weight:700;color:#facc15}
.score-item .lbl{font-size:12px;color:#6b7280}
.btn{padding:12px 28px;border:none;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(0.93)!important}
.btn-game{background:linear-gradient(135deg,#facc15,#f97316);color:#1a1a2e}
.btn-small{background:rgba(255,255,255,0.06);color:#facc15;border:1px solid rgba(250,204,21,0.3);padding:8px 20px;font-size:13px}
.footer{text-align:center;padding:40px 20px;color:#374151;font-size:13px;position:relative;z-index:1}
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#facc15,#f97316);z-index:100;transition:width 0.1s}
@media(max-width:600px){.hero h1{font-size:26px}.memory-grid{max-width:280px;gap:6px}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="hero"><h1>🧩 小游戏合集</h1><p>读博间隙·休息五分钟🧡</p></div>
<div class="container">
<div class="game-tabs">
<button class="g-tab active" data-game="memory">🧠 记忆翻牌</button>
<button class="g-tab" data-game="reaction">⚡ 反应测试</button>
<button class="g-tab" data-game="catch">🎯 接Emoji</button>
</div>
<div class="game-area" id="gameArea"></div>
</div>
<div class="footer">🧩 玩完了就回去写论文 · 但先玩完再说</div>
<script>
let currentGame='memory';
document.querySelector('.game-tabs').addEventListener('click',function(e){
const btn=e.target.closest('.g-tab');if(!btn)return;
document.querySelectorAll('.g-tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');currentGame=btn.dataset.game;loadGame();
});
function loadGame(){
if(currentGame==='memory')initMemory();
else if(currentGame==='reaction')initReaction();
else if(currentGame==='catch')initCatch();
}
// MEMORY
const memEmojis=['🐱','🐶','🐻','🐼','🦊','🐰','🐸','🦄'];
let memFlipped=[],memMatched=0,memMoves=0,memLocked=false;
function initMemory(){
memMatched=0;memMoves=0;memLocked=false;memFlipped=[];
const pairs=[...memEmojis,...memEmojis].sort(()=>Math.random()-0.5);
const a=document.getElementById('gameArea');
a.innerHTML='<h3>🧠 记忆翻牌</h3><div class="game-info">找到所有配对</div><div class="score-bar"><div class="score-item"><div class="val" id="mMoves">0</div><div class="lbl">步数</div></div><div class="score-item"><div class="val" id="mPairs">0/8</div><div class="lbl">配对</div></div></div><div class="memory-grid" id="mGrid"></div><div style="text-align:center;margin-top:16px"><button class="btn btn-small" onclick="initMemory()">🔄 重开</button></div>';
document.getElementById('mGrid').innerHTML=pairs.map((c,i)=>'<div class="mem-card hidden" data-i="'+i+'" data-e="'+c+'"></div>').join('');
document.getElementById('mGrid').onclick=function(e){
const c=e.target.closest('.mem-card');
if(!c||memLocked||c.classList.contains('matched')||!c.classList.contains('hidden'))return;
c.classList.remove('hidden');c.textContent=c.dataset.e;memFlipped.push(c);
if(memFlipped.length===2){memMoves++;document.getElementById('mMoves').textContent=memMoves;memLocked=true;
const[a,b]=memFlipped;
if(a.dataset.e===b.dataset.e){a.classList.add('matched');b.classList.add('matched');memMatched++;document.getElementById('mPairs').textContent=memMatched+'/8';memFlipped=[];memLocked=false;
if(memMatched===8)setTimeout(()=>document.querySelector('.game-info').innerHTML='🎉 '+memMoves+'步完成！',300);
}else{setTimeout(()=>{a.classList.add('hidden');a.textContent='';b.classList.add('hidden');b.textContent='';memFlipped=[];memLocked=false;},600);}}};
}
// REACTION
let rTimeout,rStart;
function initReaction(){
const best=localStorage.getItem('rBest')||'---';
document.getElementById('gameArea').innerHTML='<h3>⚡ 反应速度</h3><div class="game-info">等绿色出现后立刻点击</div><div class="score-bar"><div class="score-item"><div class="val" id="rTime">---</div><div class="lbl">毫秒</div></div><div class="score-item"><div class="val" id="rBest">'+best+'</div><div class="lbl">最佳</div></div></div><div class="reaction-zone rz-result" id="rZone">点击开始</div>';
document.getElementById('rZone').onclick=function(){
const z=this;
if(z.classList.contains('rz-result')){z.className='reaction-zone rz-wait';z.textContent='等待...';clearTimeout(rTimeout);
rTimeout=setTimeout(()=>{z.className='reaction-zone rz-go';z.textContent='点我！';rStart=performance.now();},1500+Math.random()*3000);
}else if(z.classList.contains('rz-wait')){clearTimeout(rTimeout);z.className='reaction-zone rz-result';z.textContent='太早了！重来';
}else if(z.classList.contains('rz-go')){const t=Math.round(performance.now()-rStart);z.className='reaction-zone rz-result';z.textContent=t+'ms · 再来';document.getElementById('rTime').textContent=t;
const b=localStorage.getItem('rBest');if(!b||t<parseInt(b)){localStorage.setItem('rBest',t);document.getElementById('rBest').textContent=t;}}};
}
// CATCH
let cScore,cMiss,cIv,cActive=false;
function initCatch(){
cScore=0;cMiss=0;cActive=false;
const best=localStorage.getItem('cBest')||'0';
document.getElementById('gameArea').innerHTML='<h3>🎯 接住爱心</h3><div class="game-info" id="cInfo">点击掉落的爱心，漏5个结束</div><div class="score-bar"><div class="score-item"><div class="val" id="cScore">0</div><div class="lbl">得分</div></div><div class="score-item"><div class="val" id="cMiss">0/5</div><div class="lbl">失误</div></div><div class="score-item"><div class="val" id="cBest">'+best+'</div><div class="lbl">最高</div></div></div><div class="catch-area" id="cZone"></div><div style="text-align:center;margin-top:16px"><button class="btn btn-game" id="cBtn" onclick="startCatch()">▶ 开始</button></div>';
}
function startCatch(){
if(cActive)return;cActive=true;cScore=0;cMiss=0;
document.getElementById('cScore').textContent=0;document.getElementById('cMiss').textContent='0/5';
document.getElementById('cInfo').textContent='点击爱心！';document.getElementById('cBtn').textContent='游戏中...';
document.getElementById('cZone').innerHTML='';
cIv=setInterval(()=>{if(!cActive)return;
const z=document.getElementById('cZone');if(!z)return;
const em=document.createElement('div');em.className='catch-emoji';
em.textContent=['💗','💕','💖','🩷','💝','⭐'][Math.floor(Math.random()*6)];
em.style.left=Math.random()*85+'%';em.style.animationDuration=(2+Math.random()*1.5)+'s';
em.onclick=function(e){e.stopPropagation();cScore++;document.getElementById('cScore').textContent=cScore;em.remove();};
em.addEventListener('animationend',function(){em.remove();if(!cActive)return;cMiss++;document.getElementById('cMiss').textContent=cMiss+'/5';if(cMiss>=5)endCatch();});
z.appendChild(em);},800);
}
function endCatch(){cActive=false;clearInterval(cIv);
document.getElementById('cInfo').innerHTML='结束！得分 <b>'+cScore+'</b>';document.getElementById('cBtn').textContent='🔄 再来';
const b=parseInt(localStorage.getItem('cBest')||'0');
if(cScore>b){localStorage.setItem('cBest',cScore);document.getElementById('cBest').textContent=cScore;document.getElementById('cInfo').innerHTML+=' 🎉 新纪录！';}
}
initMemory();
window.addEventListener('scroll',()=>{const h=document.documentElement;document.getElementById('progress').style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100+'%';},{passive:true});
</script>
</body>
</html>
